<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Test Page</title>
    <style>
        /* Optional: Add a border so you can see where your widget ends */
        .test-container {
            margin: 50px auto;
            padding: 20px;
            max-width: 800px;
            border: 2px dashed #ccc;
        }
    </style>
</head>
<body>

    <div class="test-container">
<script src="http://localhost:8000/static/chat-widget.min.js" defer></script>
<script>
  // NOTE: Do NOT use defer + DOMContentLoaded together on the init script.
  // With defer, the DOM is already ready when the script runs, so
  // DOMContentLoaded has already fired and the listener would never execute.
  // Instead we wait for the widget script to finish loading via onload.
  document.querySelector('script[src*="chat-widget"]').addEventListener('load', function () {
    ChatWidget.init({
      widgetToken:    'zYdcWY66BMEX91pB7A4JuyN5pDPi1qUn6r3I8bNhagw',
      apiUrl:         'http://localhost:8000',
      botName:        'Support Assistant',
      welcomeMessage: 'Hi! How can I help you today?'
    });
  });
</script>
    </div>

</body>
</html>
